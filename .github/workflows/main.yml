name: 毎朝の投資分析

on:
  schedule:
    # 月〜金の7:00 JST（= 日〜木 22:00 UTC）に実行
    - cron: '0 22 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write   # 履歴ファイルをリポジトリにコミットするために必要

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: コードチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: 分析実行
        run: python main.py
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: 履歴・使用状況をコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash push -u -m "analysis-output" || true
          git pull origin main --rebase
          git stash pop || true
          git add data/history.json data/usage.json data/portfolio.json || true
          git diff --staged --quiet || git commit -m "chore: 分析履歴・使用状況・ポートフォリオ更新 $(date +%Y-%m-%d)"
          git push
