<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ポートフォリオ管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #333; }
.container { max-width: 560px; margin: 0 auto; padding: 16px 12px 80px; }

h1 { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }
h2 { font-size: 14px; font-weight: 600; color: #555; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }

.card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; font-weight: 500; }
input[type=text], input[type=number], input[type=password], input[type=date], select {
  width: 100%; padding: 11px 12px; border: 1.5px solid #e0e0e0; border-radius: 10px;
  font-size: 15px; background: #fafafa; transition: border-color 0.2s; font-family: inherit;
}
input:focus, select:focus { outline: none; border-color: #4CAF50; background: white; }
input:disabled { color: #999; background: #f5f5f5; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field { margin-bottom: 10px; }

.btn { display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 13px; border: none; border-radius: 12px; font-size: 15px;
  font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.btn:active { opacity: 0.8; }
.btn-green { background: #4CAF50; color: white; }
.btn-blue  { background: #2196F3; color: white; margin-bottom: 10px; }

.total-box { text-align: center; padding: 8px 0; }
.total-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.total-value { font-size: 28px; font-weight: 700; color: #4CAF50; }

.holding-card { background: #f8f9fa; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
.holding-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.holding-title { font-size: 14px; font-weight: 700; color: #1a1a2e; }
.holding-sub   { font-size: 11px; color: #888; margin-top: 2px; }
.holding-stats { display: flex; gap: 16px; font-size: 12px; margin-bottom: 10px; }
.stat-item { flex: 1; }
.stat-label { color: #888; font-size: 10px; margin-bottom: 2px; }
.stat-value { font-weight: 700; font-size: 13px; }

.holding-actions { display: flex; gap: 6px; }
.btn-action { flex: 1; padding: 9px; border-radius: 8px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: none; transition: opacity 0.15s; }
.btn-action:active { opacity: 0.75; }
.btn-buy-sm  { background: #e3f2fd; color: #1565c0; }
.btn-sell-sm { background: #fce4ec; color: #c62828; }
.btn-del-sm  { background: #f5f5f5; color: #999; padding: 9px 12px; }

.lot-line { font-size: 10px; color: #aaa; margin-bottom: 6px; line-height: 1.8; }
.lot-chip { display: inline-block; background: #eeeeee; border-radius: 4px; padding: 1px 5px; margin-right: 3px; }

.token-card { background: #fff8e1; border: 1.5px solid #ffe082; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.token-card h2 { color: #f57f17; }
.token-hint { font-size: 11px; color: #888; margin-top: 6px; line-height: 1.5; }
.status { padding: 12px; border-radius: 10px; text-align: center; font-size: 14px; margin-top: 10px; display: none; }
.status.ok  { background: #e8f5e9; color: #2e7d32; display: block; }
.status.err { background: #ffebee; color: #c62828; display: block; }
.spinner { text-align: center; padding: 40px; color: #999; font-size: 14px; }

.nav { display: flex; gap: 8px; margin-bottom: 20px; }
.nav a { flex: 1; text-align: center; padding: 10px; background: white; border-radius: 10px;
  text-decoration: none; color: #555; font-size: 13px; font-weight: 600;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.nav a.active { background: #1a1a2e; color: white; }
.logout { font-size: 11px; color: #bbb; text-align: right; cursor: pointer; margin-bottom: 8px; }
.logout:hover { color: #888; }

/* モーダル */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100;
  display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: 20px 20px 0 0; padding: 20px 16px 36px;
  width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto; }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #1a1a2e; }
.modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
.btn-save   { background: #4CAF50; color: white; padding: 13px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-cancel { background: #f5f5f5; color: #555; padding: 13px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
.pnl-preview { font-size: 13px; background: #f8f9fa; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
.info-box { font-size: 12px; color: #555; background: #f0f2f5; border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; line-height: 1.6; }
</style>
</head>
<body>
<div class="container">
  <div class="nav">
    <a href="index.html" class="active">📊 ポートフォリオ</a>
    <a href="trades.html">📈 損益</a>
    <a href="manual.html">📖 説明書</a>
  </div>
  <h1>📊 ポートフォリオ管理</h1>

  <div class="token-card" id="tokenCard">
    <h2>🔑 初回設定</h2>
    <div class="field">
      <label>GitHub Personal Access Token</label>
      <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
    </div>
    <button class="btn btn-green" onclick="saveToken()">この端末に保存して開始</button>
    <p class="token-hint">
      ※ トークンはこのブラウザにのみ保存されます。<br>
      取得方法: GitHub → Settings → Developer settings → Personal access tokens → Fine-grained → Contents の Read &amp; Write 権限
    </p>
  </div>

  <div id="mainContent" style="display:none">
    <div class="logout" onclick="logout()">別のトークンに切り替える</div>

    <div class="card">
      <div class="total-box">
        <div class="total-label">推定総資産（取得価額ベース）</div>
        <div class="total-value" id="totalAsset">―</div>
      </div>
    </div>

    <div class="card">
      <h2>💴 現金残高</h2>
      <div class="field">
        <label>現金（円）</label>
        <input type="number" id="cashJpy" placeholder="500000" oninput="updateTotal()">
      </div>
    </div>

    <div class="card">
      <h2>📈 保有銘柄</h2>
      <div id="holdingsList"></div>
      <button class="btn btn-blue" onclick="openAddModal()">＋ 銘柄を追加</button>
    </div>

    <div class="card">
      <h2>⚙️ リスク設定</h2>
      <div class="grid2">
        <div class="field">
          <label>1銘柄上限（%）</label>
          <input type="number" id="maxRatio" placeholder="15">
        </div>
        <div class="field">
          <label>損切りライン（%）</label>
          <input type="number" id="stopLoss" placeholder="-8">
        </div>
      </div>
    </div>

    <button class="btn btn-green" onclick="savePortfolio()">💾 保存する</button>
    <div class="status" id="status"></div>
  </div>

  <div class="spinner" id="spinner" style="display:none">読み込み中...</div>
</div>

<!-- 銘柄追加 / 追加購入 モーダル -->
<div class="modal-overlay" id="addOverlay" onclick="onAddOverlay(event)">
  <div class="modal">
    <h3 id="addModalTitle">銘柄を追加</h3>
    <div id="addInfoBox"></div>
    <div class="field">
      <label>購入日</label>
      <input type="date" id="mDate">
    </div>
    <div class="grid2">
      <div class="field">
        <label>銘柄コード</label>
        <input type="text" id="mCode" placeholder="8306">
      </div>
      <div class="field">
        <label>銘柄名</label>
        <input type="text" id="mName" placeholder="三菱UFJ">
      </div>
    </div>
    <div class="grid2">
      <div class="field">
        <label>株数</label>
        <input type="number" id="mShares" placeholder="100" min="1">
      </div>
      <div class="field">
        <label>購入単価（円）</label>
        <input type="number" id="mPrice" placeholder="2800">
      </div>
    </div>
    <div class="field">
      <label>証券口座</label>
      <select id="mAccount">
        <option value="特定口座">特定口座（源泉 20.315%）</option>
        <option value="NISA(一般)">NISA 一般枠（非課税）</option>
        <option value="NISA(成長枠)">NISA 成長投資枠（非課税）</option>
        <option value="一般口座">一般口座（確定申告 20.315%）</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-save" onclick="confirmAdd()">追加</button>
      <button class="btn-cancel" onclick="closeAddModal()">キャンセル</button>
    </div>
  </div>
</div>

<!-- 売却モーダル -->
<div class="modal-overlay" id="sellOverlay" onclick="onSellOverlay(event)">
  <div class="modal">
    <h3 id="sellModalTitle">売却</h3>
    <div class="info-box" id="sInfo"></div>
    <div class="field">
      <label>売却日</label>
      <input type="date" id="sDate">
    </div>
    <div class="grid2">
      <div class="field">
        <label>売却株数</label>
        <input type="number" id="sShares" placeholder="100" min="1" oninput="previewSellPnl()">
      </div>
      <div class="field">
        <label>売却単価（円）</label>
        <input type="number" id="sPrice" placeholder="3200" oninput="previewSellPnl()">
      </div>
    </div>
    <div class="pnl-preview" id="sPnlPreview" style="display:none"></div>
    <div class="modal-btns">
      <button class="btn-save" style="background:#f44336" onclick="confirmSell()">売却確定</button>
      <button class="btn-cancel" onclick="closeSellModal()">キャンセル</button>
    </div>
  </div>
</div>

<script>
const OWNER = 'aiueo2940819ai-ship-it';
const REPO  = 'stock-advisor';
const API   = `https://api.github.com/repos/${OWNER}/${REPO}/contents/data/portfolio.json`;
const TAX   = 0.20315;
const NISA  = ['NISA(一般)', 'NISA(成長枠)'];

let fileSha      = null;
let portfolio    = null;
let sellCode     = null;
let addMode      = 'new';  // 'new' | 'more'

function getToken() { return localStorage.getItem('gh_pat') || ''; }

function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t.startsWith('ghp_') && !t.startsWith('github_pat_')) {
    alert('トークンの形式が正しくありません'); return;
  }
  localStorage.setItem('gh_pat', t);
  init();
}

function logout() {
  localStorage.removeItem('gh_pat');
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('tokenCard').style.display = 'block';
}

// ── 初期化 ────────────────────────────────────────────────────────────────────
async function init() {
  const token = getToken();
  if (!token) { document.getElementById('tokenCard').style.display = 'block'; return; }
  document.getElementById('tokenCard').style.display = 'none';
  document.getElementById('spinner').style.display   = 'block';
  try {
    const res  = await fetch(API, { headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' } });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'API エラー');
    fileSha   = data.sha;
    portfolio = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,'')))));
    // 初期化: sell_history がなければ作成
    if (!portfolio.sell_history) portfolio.sell_history = [];
    // 後方互換: lots がない holding にダミー lot を付与
    for (const h of (portfolio.holdings || [])) {
      if (!h.lots) {
        h.lots = (h.buy_price && h.shares)
          ? [{ id: uid(), date: '', shares: h.shares, price: h.buy_price }]
          : [];
      }
      if (!h.account) h.account = '特定口座';
    }
    renderForm();
    document.getElementById('spinner').style.display     = 'none';
    document.getElementById('mainContent').style.display = 'block';
  } catch(e) {
    document.getElementById('spinner').style.display   = 'none';
    document.getElementById('tokenCard').style.display = 'block';
    alert('読み込み失敗: ' + e.message + '\nトークンの権限（Contents Read/Write）を確認してください');
  }
}

function uid() { return String(Date.now()) + Math.random().toString(36).slice(2,6); }

// ── フォーム描画 ──────────────────────────────────────────────────────────────
function renderForm() {
  document.getElementById('cashJpy').value  = portfolio.cash_jpy || 0;
  document.getElementById('maxRatio').value = Math.round((portfolio.max_single_stock_ratio || 0.15) * 100);
  document.getElementById('stopLoss').value = Math.round((portfolio.stop_loss_ratio || -0.08) * 100);
  renderHoldings();
  updateTotal();
}

function renderHoldings() {
  const list = document.getElementById('holdingsList');
  list.innerHTML = '';
  for (const h of (portfolio.holdings || [])) {
    list.appendChild(makeCard(h));
  }
}

function makeCard(h) {
  const div   = document.createElement('div');
  div.className = 'holding-card';
  div.id      = `hc_${h.code}`;
  const total = (h.buy_price||0) * (h.shares||0);
  const nisaBadge = NISA.includes(h.account)
    ? `<span style="font-size:10px;color:#2e7d32;background:#e8f5e9;padding:1px 5px;border-radius:3px;margin-left:4px">NISA</span>`
    : '';
  const lotLine = (h.lots||[]).filter(l=>l.date).map(l =>
    `<span class="lot-chip">${l.date.slice(5)} ${l.shares}株@${(l.price||0).toLocaleString()}円</span>`
  ).join('');
  div.innerHTML = `
    <div class="holding-header">
      <div>
        <span class="holding-title">${h.code} ${h.name}</span>${nisaBadge}
        <div class="holding-sub">${h.account}</div>
      </div>
    </div>
    <div class="holding-stats">
      <div class="stat-item"><div class="stat-label">保有株数</div><div class="stat-value">${(h.shares||0).toLocaleString()}株</div></div>
      <div class="stat-item"><div class="stat-label">平均取得単価</div><div class="stat-value">${(h.buy_price||0).toLocaleString()}円</div></div>
      <div class="stat-item"><div class="stat-label">評価額（取得額）</div><div class="stat-value">${total.toLocaleString()}円</div></div>
    </div>
    ${lotLine ? `<div class="lot-line">${lotLine}</div>` : ''}
    <div class="holding-actions">
      <button class="btn-action btn-buy-sm"  onclick="openBuyMore('${h.code}')">＋ 追加購入</button>
      <button class="btn-action btn-sell-sm" onclick="openSellModal('${h.code}')">売却</button>
      <button class="btn-action btn-del-sm"  onclick="removeHolding('${h.code}')">削除</button>
    </div>`;
  return div;
}

function updateTotal() {
  const cash = parseFloat(document.getElementById('cashJpy').value) || 0;
  const val  = (portfolio?.holdings || []).reduce((s,h) => s + (h.buy_price||0)*(h.shares||0), 0);
  document.getElementById('totalAsset').textContent = (cash + val).toLocaleString('ja-JP') + ' 円';
}

function removeHolding(code) {
  const h = (portfolio.holdings||[]).find(x=>x.code===code);
  if (!confirm(`${h?.name||code} を削除しますか？`)) return;
  portfolio.holdings = (portfolio.holdings||[]).filter(x=>x.code!==code);
  renderHoldings(); updateTotal();
}

// ── 銘柄追加 / 追加購入 モーダル ─────────────────────────────────────────────
function openAddModal() {
  addMode = 'new';
  document.getElementById('addModalTitle').textContent = '銘柄を追加';
  document.getElementById('addInfoBox').innerHTML = '';
  document.getElementById('mDate').value    = today();
  document.getElementById('mCode').value    = '';
  document.getElementById('mCode').disabled = false;
  document.getElementById('mName').value    = '';
  document.getElementById('mName').disabled = false;
  document.getElementById('mShares').value  = '';
  document.getElementById('mPrice').value   = '';
  document.getElementById('mAccount').value = '特定口座';
  document.getElementById('addOverlay').classList.add('open');
}

function openBuyMore(code) {
  const h = (portfolio.holdings||[]).find(x=>x.code===code);
  if (!h) return;
  addMode = 'more';
  document.getElementById('addModalTitle').textContent = `追加購入: ${h.code} ${h.name}`;
  document.getElementById('addInfoBox').innerHTML =
    `<div class="info-box">現在 <b>${h.shares}株</b> ／ 平均取得単価 <b>${(h.buy_price||0).toLocaleString()}円</b></div>`;
  document.getElementById('mDate').value    = today();
  document.getElementById('mCode').value    = h.code;
  document.getElementById('mCode').disabled = true;
  document.getElementById('mName').value    = h.name;
  document.getElementById('mName').disabled = true;
  document.getElementById('mShares').value  = '';
  document.getElementById('mPrice').value   = '';
  document.getElementById('mAccount').value = h.account || '特定口座';
  document.getElementById('addOverlay').classList.add('open');
}

function closeAddModal() { document.getElementById('addOverlay').classList.remove('open'); }
function onAddOverlay(e) { if (e.target===document.getElementById('addOverlay')) closeAddModal(); }

function confirmAdd() {
  const date   = document.getElementById('mDate').value;
  const code   = document.getElementById('mCode').value.trim();
  const name   = document.getElementById('mName').value.trim() || code;
  const shares = parseFloat(document.getElementById('mShares').value) || 0;
  const price  = parseFloat(document.getElementById('mPrice').value) || 0;
  const acnt   = document.getElementById('mAccount').value;
  if (!code || !shares || !price) { alert('コード・株数・単価は必須です'); return; }

  const lot = { id: uid(), date, shares, price };

  if (addMode === 'new') {
    if ((portfolio.holdings||[]).find(h=>h.code===code)) {
      alert(`${code} はすでに保有中です。追加購入ボタンを使ってください`); return;
    }
    portfolio.holdings = portfolio.holdings || [];
    portfolio.holdings.push({ code, name, shares, buy_price: price, account: acnt, lots: [lot] });
  } else {
    const h = (portfolio.holdings||[]).find(x=>x.code===code);
    if (!h) return;
    const newShares = h.shares + shares;
    h.buy_price     = Math.round(((h.buy_price * h.shares) + (price * shares)) / newShares);
    h.shares        = newShares;
    h.lots          = [...(h.lots||[]), lot];
  }

  closeAddModal();
  renderHoldings(); updateTotal();
  savePortfolio('auto');
}

// ── 売却モーダル ──────────────────────────────────────────────────────────────
function openSellModal(code) {
  const h = (portfolio.holdings||[]).find(x=>x.code===code);
  if (!h) return;
  sellCode = code;
  document.getElementById('sellModalTitle').textContent = `売却: ${h.code} ${h.name}`;
  document.getElementById('sInfo').innerHTML =
    `保有 <b>${h.shares}株</b> ／ 平均取得単価 <b>${(h.buy_price||0).toLocaleString()}円</b> ／ ${h.account}`;
  document.getElementById('sDate').value   = today();
  document.getElementById('sShares').value = '';
  document.getElementById('sPrice').value  = '';
  document.getElementById('sPnlPreview').style.display = 'none';
  document.getElementById('sellOverlay').classList.add('open');
}

function closeSellModal() { document.getElementById('sellOverlay').classList.remove('open'); sellCode = null; }
function onSellOverlay(e) { if (e.target===document.getElementById('sellOverlay')) closeSellModal(); }

function previewSellPnl() {
  if (!sellCode) return;
  const h  = (portfolio.holdings||[]).find(x=>x.code===sellCode);
  const s  = parseFloat(document.getElementById('sShares').value) || 0;
  const p  = parseFloat(document.getElementById('sPrice').value)  || 0;
  const el = document.getElementById('sPnlPreview');
  if (!s || !p || !h) { el.style.display='none'; return; }
  const pnl    = Math.round((p - h.buy_price) * s);
  const isNisa = NISA.includes(h.account);
  const pat    = isNisa ? pnl : Math.round(pnl*(1-TAX));
  const taxNote= isNisa
    ? 'NISA（非課税）'
    : `税引後: <b style="color:${pat>=0?'#4CAF50':'#f44336'}">${fmtPnl(pat)}</b>`;
  el.innerHTML  = `概算損益（税前）: <b style="color:${pnl>=0?'#4CAF50':'#f44336'}">${fmtPnl(pnl)}</b> ／ ${taxNote}`;
  el.style.display = 'block';
}

function confirmSell() {
  const h      = (portfolio.holdings||[]).find(x=>x.code===sellCode);
  if (!h) return;
  const date   = document.getElementById('sDate').value;
  const shares = parseFloat(document.getElementById('sShares').value) || 0;
  const price  = parseFloat(document.getElementById('sPrice').value)  || 0;
  if (!date || !shares || !price) { alert('日付・株数・単価は必須です'); return; }
  if (shares > h.shares) { alert(`売却株数(${shares})が保有株数(${h.shares})を超えています`); return; }

  const pnl    = Math.round((price - h.buy_price) * shares);
  const isNisa = NISA.includes(h.account);
  const pnlAft = isNisa ? pnl : Math.round(pnl*(1-TAX));

  portfolio.sell_history = portfolio.sell_history || [];
  portfolio.sell_history.push({
    id: uid(), date,
    code: h.code, name: h.name,
    shares, sell_price: price,
    avg_buy_price: h.buy_price,
    account: h.account,
    realized_pnl: pnl,
    realized_pnl_after_tax: pnlAft,
    memo: '',
  });

  h.shares -= shares;
  if (h.shares <= 0) {
    portfolio.holdings = portfolio.holdings.filter(x=>x.code!==h.code);
  }

  closeSellModal();
  renderHoldings(); updateTotal();
  savePortfolio('auto');
}

// ── 保存 ─────────────────────────────────────────────────────────────────────
async function savePortfolio(mode = 'manual') {
  const token = getToken();
  if (!token) return alert('トークンが見つかりません');

  portfolio.cash_jpy               = parseFloat(document.getElementById('cashJpy').value) || 0;
  portfolio.max_single_stock_ratio = (parseFloat(document.getElementById('maxRatio').value) || 15) / 100;
  portfolio.stop_loss_ratio        = (parseFloat(document.getElementById('stopLoss').value) || -8) / 100;

  const json    = JSON.stringify(portfolio, null, 2) + '\n';
  const content = btoa(unescape(encodeURIComponent(json)));
  const body    = { message: `ポートフォリオ更新 ${new Date().toLocaleDateString('ja-JP')}`, content, sha: fileSha };

  const st = document.getElementById('status');
  st.className = 'status'; st.textContent = '保存中...'; st.style.display = 'block';
  try {
    const res  = await fetch(API, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', Accept: 'application/vnd.github+json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || '保存失敗');
    fileSha = data.content.sha;
    st.className = 'status ok';
    st.textContent = mode === 'auto' ? '✅ 保存完了' : '✅ 保存完了！明朝のメールに反映されます。';
  } catch(e) {
    st.className = 'status err';
    st.textContent = '❌ 保存失敗: ' + e.message;
  }
}

function today() { return new Date().toISOString().slice(0,10); }
function fmtPnl(v) { return (v>=0?'+':'') + Math.round(v).toLocaleString('ja-JP') + '円'; }

window.onload = init;
